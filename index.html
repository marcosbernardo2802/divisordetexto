<script>
    // CÓDIGO CAMALEÃO v9.1 (Adaptação Perfeita de Tema Estelar e Largura)
    window.addEventListener('message', function(event) {
        if (event.data) {
            
            // 1. Camuflagem de Cores (Ajusta o tema Claro/Escuro)
            if (event.data.action === 'setTheme') {
                const theme = event.data.theme;
                if (theme === 'light') {
                    document.body.classList.add('light-theme');
                    document.body.classList.remove('dark-theme');
                    document.documentElement.classList.remove('dark'); // Aciona o Tailwind Light
                } else {
                    document.body.classList.remove('light-theme');
                    document.body.classList.add('dark-theme');
                    document.documentElement.classList.add('dark'); // Aciona o Tailwind Dark Oficial
                }
            }

            // 2. Modo Módulo Embutido (Ocultar TUDO o que for externo e ajustar layout)
            if (event.data.isPortal === true) {
                
                // ATAQUE 1: Seletores de Estrutura
                const seletores = [
                    'header', 'footer', '.banner', '[class*="banner"]', 
                    '.footer-links', '.theme-switcher', '#theme-toggle', '.back-to-top', 'nav',
                    'a[href="/"]', 'a[href="index.html"]', 
                    'a[href*="cronicasestelares"]'
                ].join(', ');

                document.querySelectorAll(seletores).forEach(function(el) { 
                    el.style.display = 'none'; 
                });

                // ATAQUE 2: Caçador de Elementos Iniciais (Destrói o primeiro título da página)
                const primeiroTitulo = document.querySelector('h1, h2, .title, .page-title, [class*="titulo"], .header-title');
                if (primeiroTitulo) {
                    primeiroTitulo.style.display = 'none';
                }

                // ATAQUE 3: Caçador de Texto Implacável
                const todosElementos = document.querySelectorAll('a, button, h1, h2, h3, h4, span, div, p, strong, b');
                todosElementos.forEach(function(el) {
                    if (el.children.length > 1) return;
                    
                    const texto = el.textContent.toLowerCase().trim();
                    const link = el.href ? el.href.toLowerCase() : '';
                    
                    if (texto === 'home' || texto === 'início' || texto === 'inicio' || texto === 'voltar ao portal' || link.includes('cronicasestelares.vercel.app')) {
                        el.style.display = 'none';
                    }

                    const nomesProibidos = [
                        'divisor de texto', 
                        'conversor de roteiro para .srt', 
                        'conversor para .srt',
                        'conversor srt',
                        'remover silêncio do áudio', 
                        'remover silêncio',
                        'variador de gmail',
                        'apoio ao projeto',
                        'seja um protagonista'
                    ];

                    if (nomesProibidos.includes(texto)) {
                        el.style.display = 'none';
                    }
                });

                // ATAQUE 4: Camuflagem Estelar (Injeção de CSS para Cores, Transparência e Largura)
                const camaleaoStyle = document.createElement('style');
                camaleaoStyle.innerHTML = `
                    html, body, main {
                        background: transparent !important;
                        background-color: transparent !important;
                    }

                    :root {
                        --color-bg: transparent !important;
                        --color-card-bg: #050814 !important;
                        --color-text: #e3e3e3 !important;
                        --color-card-border: #333537 !important;
                        --color-primary: #00f2fe !important;
                    }

                    body.light-theme {
                        --color-card-bg: #f0f4f9 !important;
                        --color-text: #1f1f1f !important;
                        --color-card-border: #d1d9e0 !important;
                    }

                    .bg-white, .bg-gray-900, .bg-gray-800, .bg-[#0a0f18], .bg-[#101a2d] { 
                        background-color: var(--color-card-bg) !important; 
                        border-color: var(--color-card-border) !important;
                    }
                    .text-gray-900, .text-gray-800, .text-white, .text-gray-200 { 
                        color: var(--color-text) !important; 
                    }

                    /* Força a largura de 90% em qualquer cenário no Portal */
                    main, .container, [class*="max-w-"] {
                        width: 90% !important;
                        max-width: 90% !important;
                        margin-left: auto !important;
                        margin-right: auto !important;
                        padding-left: 0 !important;
                        padding-right: 0 !important;
                    }
                `;
                document.head.appendChild(camaleaoStyle);

                const areaPrincipal = document.querySelector('main');
                if (areaPrincipal) {
                    areaPrincipal.style.paddingTop = '0.5rem';
                    areaPrincipal.style.marginTop = '0';
                }

                document.documentElement.style.overflowY = 'hidden';
                document.body.style.overflowY = 'hidden';

                let ultimaAltura = 0;
                function informarAltura() {
                    const alturaAtual = document.body.scrollHeight;
                    if (alturaAtual !== ultimaAltura && alturaAtual > 0) {
                        ultimaAltura = alturaAtual;
                        window.parent.postMessage({ action: 'resizeIframe', height: alturaAtual }, '*');
                    }
                }

                informarAltura();
                const observer = new MutationObserver(informarAltura);
                observer.observe(document.body, { childList: true, subtree: true, attributes: true });
            }
        }
    });
</script>

                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span>Apoie este projeto</span>
                </a>
                <a href="mailto:cronicasestelares.oficial@gmail.com" target="_blank" rel="noopener noreferrer" class="email-link">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    <span>cronicasestelares.oficial@gmail.com</span>
                </a>
            </div>
            <p class="copyright-text">&copy; <span id="current-year"></span> Crônicas Estelares. Todos os sistemas operativos.</p>
        </div>
    </footer>
    
    <a id="back-to-top-btn" class="floating-button back-to-top" title="Voltar ao topo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
    </a>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputTextElem = document.getElementById('inputText');
            const limitInput = document.getElementById('limitInput');
            const limitLabel = document.getElementById('limitLabel');
            const splitButton = document.getElementById('splitButton');
            const clearButton = document.getElementById('clearButton');
            const outputDiv = document.getElementById('output');
            const mainCharCounter = document.getElementById('mainCharCounter');
            const mainWordCounter = document.getElementById('mainWordCounter');
            const mainNarrationTime = document.getElementById('mainNarrationTime');
            const messageDiv = document.getElementById('message');
            const themeToggleButton = document.getElementById('theme-toggle');
            const backToTopButton = document.getElementById("back-to-top-btn");
            const yearElement = document.getElementById('current-year');
            const copyMainButton = document.getElementById('copyMainButton');
            const modeRadios = document.querySelectorAll('input[name="splitMode"]');
            const confirmModal = document.getElementById('confirmModal');
            const cancelClearBtn = document.getElementById('cancelClear');
            const confirmClearBtn = document.getElementById('confirmClear');
            const localStorageKey = 'divisorTextoSalvo';

            if (yearElement) yearElement.textContent = new Date().getFullYear();
            
            const applyInitialTheme = () => {
                const storedTheme = localStorage.getItem('theme');
                if (storedTheme) {
                    document.body.classList.toggle('light-theme', storedTheme === 'light');
                } else {
                    const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
                    document.body.classList.toggle('light-theme', prefersLight);
                }
            };
            applyInitialTheme();

            const savedText = localStorage.getItem(localStorageKey);
            if (savedText) { inputTextElem.value = savedText; updateCounters(savedText); }

            function showMessage(msg, type = 'success') {
                messageDiv.textContent = msg;
                messageDiv.className = type;
                setTimeout(() => { messageDiv.textContent = ''; }, 3000);
            }

            function formatNarrationTime(charCount) {
                if (charCount === 0) return "0s";
                const totalSeconds = Math.round((charCount / 1000) * 60);
                if (totalSeconds < 60) return `${totalSeconds}s`;
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                return seconds === 0 ? `${minutes}m` : `${minutes}m ${seconds}s`;
            }

            function updateCounters(text) {
                const words = text.trim().split(/\s+/).filter(Boolean);
                mainCharCounter.textContent = text.length;
                mainWordCounter.textContent = text.length > 0 ? words.length : 0;
                mainNarrationTime.textContent = formatNarrationTime(text.length);
            }
            
            async function copyToClipboard(text, button, textareaToSelect) {
                document.querySelectorAll('.copied').forEach(el => {
                    el.classList.remove('copied');
                    el.innerHTML = el.id === 'copyMainButton' ? '<i class="fas fa-copy"></i> Copiar Guião' : '<i class="fas fa-copy"></i> Copiar';
                });
                let success = false;
                try {
                    await navigator.clipboard.writeText(text);
                    success = true;
                } catch (err) {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed"; textArea.style.top = "-9999px";
                    document.body.appendChild(textArea);
                    textArea.select();
                    try { document.execCommand('copy'); success = true; } finally { document.body.removeChild(textArea); }
                }
                if (success) {
                    button.innerHTML = '<i class="fas fa-check"></i> Copiado!';
                    button.classList.add('copied');
                    showMessage('Texto copiado!', 'success');
                    if (textareaToSelect) textareaToSelect.select();
                }
            }
            
            function updateMode() {
                const isChars = document.querySelector('input[name="splitMode"]:checked').value === 'chars';
                limitInput.value = isChars ? 4900 : 800;
            }
            
            function splitText() {
                const text = inputTextElem.value.trim();
                const limit = parseInt(limitInput.value, 10);
                const mode = document.querySelector('input[name="splitMode"]:checked').value;
                outputDiv.innerHTML = '';
                if (!text) return showMessage('Insira um texto.', 'error');
                if (mode === 'chars') splitByChars(text, limit); else splitByWords(text, limit);
                if (outputDiv.children.length > 0) {
                    showMessage('Texto dividido!', 'success');
                    splitButton.classList.add('splitted');
                    splitButton.innerHTML = '<i class="fas fa-check"></i> Texto Dividido';
                }
            }

            function splitByChars(text, charLimit) {
                let startIndex = 0; let partNumber = 1;
                while (startIndex < text.length) {
                    let endIndex = startIndex + charLimit;
                    if (endIndex >= text.length) { endIndex = text.length; } else {
                        const chunk = text.substring(startIndex, endIndex);
                        const lastEllipsis = Math.max(chunk.lastIndexOf('... '), chunk.lastIndexOf('...\n'));
                        const lastPunctuation = Math.max(
                            chunk.lastIndexOf('. '), chunk.lastIndexOf('! '), chunk.lastIndexOf('? '),
                            chunk.lastIndexOf('.\n'), chunk.lastIndexOf('!\n'), chunk.lastIndexOf('?\n')
                        );
                        let bestBreak = -1;
                        if (lastEllipsis !== -1) bestBreak = lastEllipsis + 3;
                        if (lastPunctuation !== -1 && lastPunctuation > bestBreak) bestBreak = lastPunctuation + 1;
                        if (bestBreak !== -1) endIndex = startIndex + bestBreak;
                        else { const lastSpace = chunk.lastIndexOf(' '); if (lastSpace !== -1) endIndex = startIndex + lastSpace; }
                    }
                    const partText = text.substring(startIndex, endIndex).trim();
                    if (partText) createPartCard(partText, partNumber++);
                    startIndex = endIndex;
                }
            }
            
            function splitByWords(text, wordLimit) {
                const words = text.split(/\s+/).filter(Boolean);
                let partNumber = 1;
                for (let i = 0; i < words.length; i += wordLimit) {
                    const chunk = words.slice(i, i + wordLimit);
                    createPartCard(chunk.join(' '), partNumber++);
                }
            }
            
            function createPartCard(text, number) {
                const card = document.createElement('div');
                card.className = 'app-card part-card';
                const partTextarea = document.createElement('textarea');
                partTextarea.className = 'part-textarea';
                partTextarea.value = text;
                const countersDiv = document.createElement('div');
                countersDiv.className = 'counters-group';
                const timeSpan = document.createElement('span'); timeSpan.className = 'narration-time';
                const charSpan = document.createElement('span'); charSpan.className = 'char-counter';
                const wordSpan = document.createElement('span'); wordSpan.className = 'word-counter';
                const updatePartCounters = (txt) => {
                    const wds = txt.trim().split(/\s+/).filter(Boolean);
                    timeSpan.innerHTML = `<i class="fas fa-clock"></i> ${formatNarrationTime(txt.length)}`;
                    charSpan.innerHTML = `<i class="fas fa-keyboard"></i> ${txt.length}`;
                    wordSpan.innerHTML = `<i class="fas fa-file-word"></i> ${wds.length}`;
                };
                partTextarea.addEventListener('input', () => updatePartCounters(partTextarea.value));
                updatePartCounters(text);
                countersDiv.append(timeSpan, charSpan, wordSpan);
                card.innerHTML = `<div class="part-header"><h3>Parte ${number}</h3></div>`;
                card.querySelector('.part-header').appendChild(countersDiv);
                card.appendChild(partTextarea);
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'part-actions';
                const copyButton = document.createElement('button');
                copyButton.innerHTML = '<i class="fas fa-copy"></i> Copiar';
                copyButton.addEventListener('click', (e) => copyToClipboard(partTextarea.value, e.currentTarget, partTextarea));
                actionsDiv.appendChild(copyButton);
                card.appendChild(actionsDiv);
                outputDiv.appendChild(card);
            }

            themeToggleButton.addEventListener('click', () => {
                const isLight = document.body.classList.toggle('light-theme');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
            });
            window.addEventListener("scroll", () => { backToTopButton.classList.toggle("show", window.scrollY > 300); });
            backToTopButton.addEventListener('click', (e) => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
            inputTextElem.addEventListener('input', (e) => { updateCounters(e.target.value); localStorage.setItem(localStorageKey, e.target.value); splitButton.innerHTML = '<i class="fas fa-scissors"></i>Dividir Texto'; });
            modeRadios.forEach(radio => radio.addEventListener('change', updateMode));
            splitButton.addEventListener('click', splitText);
            clearButton.addEventListener('click', () => { if (!inputTextElem.value.trim() && !outputDiv.innerHTML) return showMessage('Nada para apagar.', 'error'); confirmModal.classList.add('active'); });
            cancelClearBtn.addEventListener('click', () => confirmModal.classList.remove('active'));
            confirmClearBtn.addEventListener('click', () => { inputTextElem.value = ''; outputDiv.innerHTML = ''; localStorage.removeItem(localStorageKey); updateCounters(''); confirmModal.classList.remove('active'); showMessage('Tudo apagado!'); });
            confirmModal.addEventListener('click', (e) => { if (e.target === confirmModal) confirmModal.classList.remove('active'); });
            copyMainButton.addEventListener('click', () => { if (!inputTextElem.value) return showMessage('Nada para copiar.', 'error'); copyToClipboard(inputTextElem.value, copyMainButton, inputTextElem); });
        });
    </script>
</body>
</html>
